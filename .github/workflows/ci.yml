name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint + Type Check + Tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Ruff
      run: ruff check .

    - name: Type check with Mypy
      run: mypy src/ --ignore-missing-imports

    - name: Run Pytest
      env:
        PYTHONPATH: .
      run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Job 2: Docker build validation (no push needed unless on main)
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (validate only)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false          # Don't push to a registry (no cost, just validate)
        tags: dark-data-api:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

