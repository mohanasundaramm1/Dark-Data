# =============================================================================
# Common service definition inherited by profiles
# =============================================================================
x-api-common: &api-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: dark-data-api:latest
  env_file: .env
  depends_on:
    qdrant:
      condition: service_healthy
  restart: unless-stopped

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Qdrant Vector DB  (used by all profiles)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2 # Pinned version
    container_name: qdrant_local
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda (Kafka)  [dev profile only]
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11 # Pinned
    container_name: redpanda_local
    profiles: [ "dev", "streaming" ]
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:49092,OUTSIDE://0.0.0.0:39092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:49092,OUTSIDE://localhost:39092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:48082,OUTSIDE://0.0.0.0:38082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:48082,OUTSIDE://localhost:38082
    ports:
      - "8088:8081"
      - "8089:8082"
      - "39092:39092"
      - "38082:38082"
      - "49092:49092"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI — Dev profile (auto-reload, debug)
  # ---------------------------------------------------------------------------
  api-dev:
    <<: *api-common
    profiles: [ "dev" ]
    container_name: dark_data_api_dev
    command: [ "uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8888", "--reload" ]
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src # Hot-reload: mounts source for live editing

  # ---------------------------------------------------------------------------
  # FastAPI — Prod profile (gunicorn + uvicorn workers)
  # ---------------------------------------------------------------------------
  api-prod:
    <<: *api-common
    profiles: [ "prod" ]
    container_name: dark_data_api_prod
    command:
      - "uvicorn"
      - "src.api.app:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8888"
      - "--workers"
      - "4"
      - "--log-level"
      - "warning"
    ports:
      - "8888:8888"

  # ---------------------------------------------------------------------------
  # Streamlit UI  [dev profile]
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    profiles: [ "dev" ]
    container_name: dark_data_ui
    command: [ "streamlit", "run", "src/ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0" ]
    environment:
      - API_URL=http://api-dev:8888/search
    ports:
      - "8501:8501"
    depends_on:
      - api-dev
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  qdrant_storage:
